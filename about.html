<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Sparkle Clean Services</title>
  </head>
  <body>
    <header>
      <!-- Navbar starts-->
      <nav class="navbar navbar-expand-lg">
        <div class="container">
          <a class="navbar-brand" href="./index.html"
            ><img
              class="img-fluid sparkle-clean-services-logo"
              src="./assets/images/SLS-logo.png"
              alt="Sparkle Clean Services logo"
          /></a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#nav-menu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="nav-menu">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link active" href="./index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./index.html">About</a>
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  role="button"
                  data-bs-toggle="dropdown"
                  href="#"
                  >Services</a
                >
                <ul class="dropdown-menu">
                  <li>
                    <a class="dropdown-item" href="#home-cleaning"
                      >Home Cleaning</a
                    >
                  </li>
                  <li>
                    <a class="dropdown-item" href="#office-cleaning"
                      >Office Cleaning</a
                    >
                  </li>
                  <li>
                    <a
                      class="dropdown-item"
                      href="#move-in-or-move-out-cleaning"
                      >Move-In / Move-Out Cleaning</a
                    >
                  </li>
                  <li><a class="dropdown-item" href="#pricing">Pricing</a></li>
                </ul>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./contact.html">Contact</a>
              </li>
            </ul>
            <div class="d-flex gap-2 ms-lg-3">
              <button
                type="button"
                class="btn btn-outline-light me-2"
                data-bs-toggle="modal"
                data-bs-target="#login"
              >
                Login
              </button>
              <button
                type="button"
                class="btn btn-warning"
                data-bs-toggle="modal"
                data-bs-target="#sign-up"
              >
                Sign-up
              </button>
            </div>
          </div>
        </div>
      </nav>
      <!-- Navbar ends-->
    </header>

    <footer class="py-5">
      <div class="container">
        <small class="d-flex align-items-center justify-content-center mt-4">
          &copy; Copyright 2026 Sparkle Clean Services. | All Rights Reserved.
        </small>
      </div>
    </footer>

    <!-- Modal -->

    <!-- Login modal starts -->

    <div
      class="modal fade"
      id="login"
      tabindex="-1"
      aria-labelledby="loginLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5 text-light" id="loginLabel">Login</h2>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p class="lead">Enter Login Details</p>
            <form>
              <div class="mb-3">
                <label
                  for="login-email"
                  name="email-address"
                  class="col-form-label"
                >
                  Email Address:
                </label>
                <input
                  type="email"
                  class="form-control"
                  id="login-email"
                  placeholder="Please enter Email"
                  required
                />
              </div>
              <div class="mb-3">
                <label
                  for="login-password"
                  name="password"
                  class="col-form-label"
                >
                  Password:
                </label>
                <input
                  type="password"
                  class="form-control"
                  id="login-password"
                  placeholder="Please enter Password"
                  required
                />
              </div>
            </form>
          </div>
          <div
            class="modal-footer d-flex align-items-center justify-content-center"
          >
            <button
              type="button"
              class="btn btn-outline-dark btn-lg mx-2 mx-md-4"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="type" class="btn btn-primary btn-lg mx-2 mx-md-4">
              Login
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Login modal ends -->

    <!-- Sign up modal starts -->

    <div
      class="modal fade"
      id="sign-up"
      tabindex="-1"
      aria-labelledby="sign-upLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h2 class="modal-title fs-5 text-light" id="sign-upLabel">
              Sign Up
            </h2>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p class="lead">Fill out the following form</p>
            <form>
              <div class="mb-3">
                <label
                  for="first-name"
                  name="first-name"
                  class="col-form-label"
                >
                  First Name:
                </label>
                <input
                  type="text"
                  class="form-control"
                  id="first-name"
                  placeholder="Please enter First Name"
                  required
                />
              </div>
              <div class="mb-3">
                <label
                  for="second-name"
                  name="second-name"
                  class="col-form-label"
                >
                  Second Name:
                </label>
                <input
                  type="text"
                  class="form-control"
                  id="second-name"
                  placeholder="Please enter Second Name"
                  required
                />
              </div>
              <div class="mb-3">
                <label
                  for="email-address"
                  name="email-address"
                  class="col-form-label"
                >
                  Email Address:
                </label>
                <input
                  type="email"
                  class="form-control"
                  id="email-address"
                  placeholder="Please enter Email"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="password" name="password" class="col-form-label">
                  Password:
                </label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  placeholder="Please enter Password"
                  required
                />
              </div>
              <div class="mb-3">
                <label
                  for="phone-number"
                  name="phone-number"
                  class="col-form-label"
                >
                  Phone Number:
                </label>
                <input
                  type="text"
                  class="form-control"
                  id="phone-number"
                  placeholder="Please enter Phone Number"
                  required
                />
              </div>
            </form>
          </div>
          <div
            class="modal-footer d-flex align-items-center justify-content-center"
          >
            <button
              type="button"
              class="btn btn-outline-dark btn-lg mx-2 mx-md-4"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="submit" class="btn btn-warning btn-lg mx-2 mx-md-4">
              Submit
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Sign up modal ends -->

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
